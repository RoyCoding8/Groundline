treatments:
  pressure_low_attention: {incentive_pressure: 0.9, attention_budget: 0}
  pressure_high_attention: {incentive_pressure: 0.9, attention_budget: 3}
  no_pressure_low_attention: {incentive_pressure: 0.0, attention_budget: 0}
  no_pressure_high_attention: {incentive_pressure: 0.0, attention_budget: 3}
analysis:
  seed: 20260716
  missingness: fail_if_missing
  contrasts:
    - id: h1-pressure-amplification
      baseline: no_pressure_low_attention
      intervention: pressure_low_attention
      outcome: upward_amplification
      direction: increase
      family: co-primary
      status: confirmatory
    - id: h2-incentive-ablation
      baseline: pressure_high_attention
      intervention: no_pressure_high_attention
      outcome: executive_optimism_bias_adverse_mean
      direction: decrease
      family: co-primary
      status: confirmatory
    - id: h3-verification-capacity
      baseline: pressure_low_attention
      intervention: pressure_high_attention
      outcome: executive_absolute_error_adverse_mean
      direction: decrease
      family: confirmatory-secondary
      status: confirmatory
    - id: h6-oracle-regret
      baseline: no_pressure_high_attention
      intervention: pressure_low_attention
      outcome: oracle_regret
      direction: increase
      family: confirmatory-secondary
      status: confirmatory
    - id: vector-loss-pressure
      baseline: no_pressure_low_attention
      intervention: pressure_low_attention
      outcome: executive_vector_loss_adverse_mean
      direction: increase
      family: secondary-epistemic
      status: exploratory
    - id: escalation-delay-pressure
      baseline: no_pressure_low_attention
      intervention: pressure_low_attention
      outcome: escalation_delay_mean
      direction: increase
      family: secondary-epistemic
      status: exploratory
  sensitivities:
    - id: h1-pre-release
      contrast_id: h1-pressure-amplification
      kind: exclude_post_release_ticks
    - id: h2-all-ticks
      contrast_id: h2-incentive-ablation
      kind: adverse_vs_all_ticks
    - id: h2-median
      contrast_id: h2-incentive-ablation
      kind: mean_vs_median
    - id: h2-pre-release
      contrast_id: h2-incentive-ablation
      kind: exclude_post_release_ticks
    - id: h2-valid-responses-only
      contrast_id: h2-incentive-ablation
      kind: exclude_invalid_or_refused
      missingness: complete_case
    - id: vector-equal-weights
      contrast_id: vector-loss-pressure
      kind: equal_health_dimension_weights
    - id: vector-progress-only
      contrast_id: vector-loss-pressure
      kind: progress_dimension_only
    - id: vector-quality-only
      contrast_id: vector-loss-pressure
      kind: quality_dimension_only
    - id: vector-schedule-only
      contrast_id: vector-loss-pressure
      kind: schedule_dimension_only
    - id: vector-reliability-only
      contrast_id: vector-loss-pressure
      kind: reliability_dimension_only
    - id: vector-pre-release
      contrast_id: vector-loss-pressure
      kind: exclude_post_release_ticks
    - id: escalation-threshold-low
      contrast_id: escalation-delay-pressure
      kind: alternative_escalation_threshold
      threshold: 0.5
    - id: escalation-threshold-high
      contrast_id: escalation-delay-pressure
      kind: alternative_escalation_threshold
      threshold: 2.0
